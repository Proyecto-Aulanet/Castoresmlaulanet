<!DOCTYPE html>
<html lang="es" class="h-full">

<head>

    <meta charset="UTF-8">

    <!-- RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Castores Multilingües Aul@Net</title>

    <!-- BOOTSTRAP -->
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">

    <!-- BOOTSTRAP ICONS -->
    <link rel="stylesheet" href="/assets/icons/font/bootstrap-icons.css">

    <!-- AOS -->
    <link rel="stylesheet" href="/assets/css/aos.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/styles/styles.css">

</head>

<body>

    <div id="app" class="w-full min-h-full flex flex-col">

 <!-- HEADER -->
<header
    class="header-main sticky-top shadow-lg">

    <div class="container">

        <div
            class="d-flex justify-content-between align-items-center py-3 flex-wrap gap-3">

            <div class="d-flex justify-content-center">

            <img
                src="/Recursos/logos/logo_completo_svg.svg"
                alt="logo"
                class="img-fluid"
                style="width:100%; max-width:185px;"
                data-aos="fade-right">

            </div>

        </div>

        <!-- NAVBAR -->
        <nav class="navbar navbar-expand-lg pb-3">

            <div class="container-fluid">

                <!-- BOTON HAMBURGUESA -->
                <button
                    class="navbar-toggler ms-auto bg-white"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menuNavbar">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <!-- MENU -->
                <div
                    class="collapse navbar-collapse"
                    id="menuNavbar">

                    <div class="navbar-nav gap-2 ms-auto">

                    <button
                        onclick="showPage('home')"
                        class="btn btn-light rounded-pill"

                        data-es="Inicio"
                        data-na="Pewaloyan">

                        <i class="bi bi-house-fill me-1"></i>

                        Inicio

                    </button>

                    <button
                        onclick="showPage('modules')"
                        class="btn btn-light rounded-pill"

                        data-es="Lecciones"
                        data-na="Temachtilli">

                        <i class="bi bi-book-fill me-1"></i>

                        Lecciones

                    </button>

                    </div>

                </div>

            </div>

        </nav>

    </div>

</header>

        <!-- MAIN -->
        <main class="container py-5">

         <div class="d-flex align-items-center gap-3 stats-box">

                <!-- RACHA -->
                <div class="stat-item">

                    <i class="bi bi-fire stat-icon text-warning"></i>

                    <div>

                        <small
                            class="stat-label"
                            data-es="Racha"
                            data-na="Tlatzintli">

                            Racha

                        </small>

                        <span
                            id="streak-display"
                            class="stat-value">

                            0

                        </span>

                    </div>

                </div>

                <!-- XP -->
                <div class="stat-item">

                    <i class="bi bi-stars stat-icon text-warning"></i>

                    <div>

                        <small
                            class="stat-label"
                            data-es="Experiencia"
                            data-na="Machiyotl">

                            Experiencia

                        </small>

                        <span
                            id="xp-display"
                            class="stat-value">

                            0

                        </span>

                    </div>

                </div>

                <!-- VIDAS -->
                <div class="stat-item">

                    <i class="bi bi-heart-fill stat-icon text-danger"></i>

                    <div>

                        <small
                            class="stat-label"
                            data-es="Vidas"
                            data-na="Yolistli">

                            Vidas

                        </small>

                        <span
                            id="lives-display"
                            class="stat-value">

                            5

                        </span>

                    </div>

                </div>

            </div>
            
            <!-- BOTÓN TRADUCTOR -->
            <div class="d-flex justify-content-end">

                <div class="presen-traductor">

                    <!-- BOTÓN -->
                    <button
                        class="btn btn-light rounded-circle traductor-btn"
                        onclick="presenToggleMenu()"
                        data-aos="zoom-in">

                        <i class="bi bi-translate"></i>

                    </button>

                    <!-- MENÚ -->
                    <div
                        class="presen-menu"
                        id="presenMenuIdioma">

                        <ul class="list-unstyled m-0">

                            <li onclick="presenCambiarModo('es')">
                                Español
                            </li>

                            <li onclick="presenCambiarModo('na')">
                                Náhuatl
                            </li>

                            <li onclick="presenCambiarModo('es-na')">
                                Español + Náhuatl
                            </li>

                            <li onclick="presenCambiarModo('na-es')">
                                Náhuatl + Español
                            </li>

                        </ul>

                    </div>

                </div>

            </div>

        <!-- HOME -->
        <section
            id="page-home"
            class="page-section">

            <div class="text-center mb-5">

                <div
                    class="display-1 mb-4 float-anim">

                    🦎

                </div>

                <h2
                    class="hero-title mb-3"
                    data-aos="fade-up">

                    <span
                        data-es="¡Aprende Náhuatl de forma divertida!"
                        data-na="¡Ximomachtia nāhuatl ica pakilistli!">

                        ¡Aprende Náhuatl de forma divertida!

                    </span>

                </h2>

                <p
                    class="hero-text mx-auto"
                    data-aos="fade-up">

                    <span
                        data-es="Descubre la riqueza del náhuatl."
                        data-na="Xikmati in hueyi tlamantli nāhuatl.">

                        Descubre la riqueza del náhuatl.

                    </span>

                </p>

            </div>

            <div class="text-center">

            <button
                onclick="showPage('modules')"
                class="btn btn-success btn-lg rounded-pill px-5 pulse-glow">

                <span
                    data-es="¡Comenzar a aprender!"
                    data-na="¡Pewas timomachtis!">

                    ¡Comenzar a aprender!

                </span>

                <i class="bi bi-rocket-takeoff-fill ms-2"></i>

            </button>

            </div>

        </section>

            <!-- MODULOS -->
            <section
                id="page-modules"
                class="page-section hidden">

                <h2
                    class="font-display text-2xl font-bold mb-6 text-jade-700">

                    📚 Módulos de Aprendizaje

                </h2>

                <div
                    id="modules-grid"
                    class="row g-4">

                </div>

            </section>

            <!-- MISIONES -->
            <section
                id="page-missions"
                class="page-section hidden">

                <button
                    onclick="showPage('modules')"
                    class="mb-4 bg-jade-500 text-white px-4 py-2 rounded-lg">

                    Volver

                </button>

                <div id="missions-container"></div>

            </section>

        </main>

    </div>

    <!-- BOOTSTRAP -->
    <script src="/assets/js/bootstrap.bundle.min.js"></script>

    <!-- AOS -->
    <script src="/assets/js/aos.js"></script>

    <!-- INIT AOS -->
    <script>
        AOS.init({
            duration: 800,
            once: true
        });
    </script>

    <!-- JS -->
    <script src="/js/app.js"></script>

</body>

</html>
