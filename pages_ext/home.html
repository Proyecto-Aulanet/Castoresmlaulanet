<!DOCTYPE html>
<html lang="es" class="h-full">

<head>

    <meta charset="UTF-8">

    <!-- RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Castores Multilingües Aul@Net</title>

    <!-- BOOTSTRAP -->
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">

    <!-- BOOTSTRAP ICONS -->
    <link rel="stylesheet" href="/assets/icons/font/bootstrap-icons.css">

    <!-- AOS -->
    <link rel="stylesheet" href="/assets/css/aos.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/styles/styles.css">

</head>

<body>

    <div id="app" class="w-full min-h-full flex flex-col">

<!-- HEADER -->
<header
    class="header-main shadow-lg">

    <div class="container">

        <div
            class="d-flex justify-content-between align-items-center py-3 flex-wrap gap-3">

            <!-- LOGO -->
            <div class="d-flex justify-content-center">

                <img
                    src="/Recursos/logos/logo_completo_svg.svg"
                    alt="logo"
                    class="img-fluid"
                    style="width:150%; max-width:181px;"
                    data-aos="fade-right">

            </div>

            <!-- BOTÓN LOGIN -->
            <button
                class="btn btn-light rounded-pill px-3 py-2"
                data-bs-toggle="modal"
                data-bs-target="#loginModal"
                data-aos="flip-right">

                <div
                    class="d-flex flex-column flex-md-row align-items-center justify-content-center">

                    <i class="bi bi-person-circle me-md-2 mb-1 mb-md-0"></i>

                    <span
                        class="solo-simple"
                        data-es="Iniciar Sesión"
                        data-na="Pewas">

                        Iniciar Sesión

                    </span>

                </div>

            </button>

        </div>

    </div>

</header>

<!-- =========================================
     MODAL LOGIN
========================================= -->

<div
    class="modal fade"
    id="loginModal"
    tabindex="-1"
    aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content border-0 rounded-4 shadow-lg">

            <!-- HEADER MODAL -->

            <div class="modal-header border-0">

                <h5
                    class="modal-title fw-bold">

                    <span
                        data-es="Iniciar Sesión"
                        data-na="Pewas">

                        Iniciar Sesión

                    </span>

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">

                </button>

            </div>

            <!-- BODY -->

            <div class="modal-body px-4 pb-4">

                <!-- CORREO -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">

                        <span
                            data-es="Correo electrónico"
                            data-na="Correo electrónico">

                            Correo electrónico

                        </span>

                    </label>

                    <input
                        type="email"
                        class="form-control rounded-3"
                        placeholder="ejemplo@email.com">

                </div>

                <!-- CONTRASEÑA -->

                <div class="mb-4">

                    <label class="form-label fw-semibold">

                        <span
                            data-es="Contraseña"
                            data-na="Tlatzakuilli">

                            Contraseña

                        </span>

                    </label>

                    <input
                        type="password"
                        class="form-control rounded-3"
                        placeholder="********">

                </div>

                <!-- BOTÓN -->

                <button
                    class="btn btn-success w-100 rounded-3 py-2">

                    <i class="bi bi-box-arrow-in-right me-2"></i>

                    <span
                        data-es="Entrar"
                        data-na="Kalaki">

                        Entrar

                    </span>

                </button>

            </div>

        </div>

    </div>

</div>

        <!-- MAIN -->
        <main>


            <!-- HOME -->
                <section
                    id="page-home"
                    class="page-section d-flex align-items-center justify-content-center min-vh-100 position-relative overflow-hidden">

                <!-- CARRUSEL -->
                <div
                    id="homeCarousel"
                    class="carousel slide carousel-fade position-absolute top-0 start-0 w-100 h-100"
                    data-bs-ride="carousel"
                    data-bs-interval="4000">

                    <div class="carousel-inner h-100">

                        <div class="carousel-item active h-100">

                            <img
                                src="/Recursos/fondos_carrusel/memelas.jpeg"
                                class="d-block w-100 h-100 carousel-bg"
                                alt="">

                        </div>

                        <div class="carousel-item h-100">

                            <img
                                src="/Recursos/fondos_carrusel/parroquia.jpeg"
                                class="d-block w-100 h-100 carousel-bg"
                                alt="">

                        </div>

                        <div class="carousel-item h-100">

                            <img
                                src="/Recursos/fondos_carrusel/grupodanza.jpeg"
                                class="d-block w-100 h-100 carousel-bg"
                                alt="">

                        </div>

                        <div class="carousel-item h-100">

                            <img
                                src="/Recursos/fondos_carrusel/ceremonial.jpeg"
                                class="d-block w-100 h-100 carousel-bg"
                                alt="">

                        </div>

                        
                        <div class="carousel-item h-100">

                            <img
                                src="/Recursos/fondos_carrusel/ceremonial2.jpeg"
                                class="d-block w-100 h-100 carousel-bg"
                                alt="">

                        </div>
                        

                    </div>

                </div>

                <!-- OVERLAY -->

                <div class="carousel-overlay"></div>

                <!-- CONTENIDO -->
                    <div class="container hero-content text-center">

                    <!-- BOTÓN TRADUCTOR -->
                    <div class="d-flex justify-content-end w-100">

                        <div class="presen-traductor">

                            <!-- BOTÓN -->
                            <button
                                class="btn btn-light rounded-circle traductor-btn"
                                onclick="presenToggleMenu()"
                                data-aos="zoom-in">

                                <i class="bi bi-translate"></i>

                            </button>

                            <!-- MENÚ -->
                            <div
                                class="presen-menu"
                                id="presenMenuIdioma">

                                <ul class="list-unstyled m-0">

                                    <li onclick="presenCambiarModo('es')">
                                        Español
                                    </li>

                                    <li onclick="presenCambiarModo('na')">
                                        Náhuatl
                                    </li>

                                    <li onclick="presenCambiarModo('es-na')">
                                        Español + Náhuatl
                                    </li>

                                    <li onclick="presenCambiarModo('na-es')">
                                        Náhuatl + Español
                                    </li>

                                </ul>

                            </div>

                        </div>

                    </div>

                    <!-- IMAGEN -->

                    <div class="d-flex justify-content-center">

                        <img
                            src="/Recursos/nahui/nahui_amigos.png"
                            alt="Nahui Amigos"
                            class="img-fluid float-anim"
                            style="max-width:480px; width:80%;"
                            data-aos="zoom-out">

                    </div>

                    <!-- TITULO -->

                    <h2
                        class="hero-title mb-3 text-white"
                        data-aos="fade-up">

                        <span
                            data-es="¡Aprende Náhuatl de forma divertida!"
                            data-na="¡Ximomachtia nāhuatl ica pakilistli!">

                            ¡Aprende Náhuatl de forma divertida!

                        </span>

                    </h2>

                    <!-- TEXTO -->

                    <p
                        class="hero-text mx-auto text-white"
                        data-aos="fade-up">

                        <span
                            data-es="Descubre la riqueza del náhuatl."
                            data-na="Xikmati in hueyi tlamantli nāhuatl.">

                            Descubre la riqueza del náhuatl.

                        </span>

                    </p>

                    <!-- BOTÓN -->

                    <button
                        onclick="showPage('modules')"
                        class="btn btn-success btn-lg rounded-pill px-5 pulse-glow mt-3">

                        <span
                            data-es="¡Comenzar a aprender!"
                            data-na="¡Pewas timomachtis!">

                            ¡Comenzar a aprender!

                        </span>

                        <i class="bi bi-rocket-takeoff-fill ms-2"></i>

                    </button>

                </div>

            </section>

        </main>

    </div>

    <!-- BOOTSTRAP -->
    <script src="/assets/js/bootstrap.bundle.min.js"></script>

    <!-- AOS -->
    <script src="/assets/js/aos.js"></script>

    <!-- INIT AOS -->
    <script>
        AOS.init({
            duration: 800,
            once: true
        });
    </script>

    <!-- JS -->
    <script src="/js/app.js"></script>

</body>

</html>
