                            <!-- BOTÓN -->

<!--           CREAR CUENTA                -->
<!-- ===================================== -->
<div class="container register-container">
<section
    id="page-register"
    class="page-section">

    <div class="container mt-5 pt-5">

        <div class="row justify-content-center">

            <div
                class="col-12 col-lg-10 col-xl-8"
                data-aos="zoom-in">

                <div class="register-card p-4 p-md-5">

                <!-- ENCABEZADO -->

                <div class="d-flex justify-content-between align-items-center mb-4">

                    <!-- REGRESAR -->

                    <button
                        onclick="window.location.href='home.html'"
                        class="btn register-back-btn rounded-pill">

                        <i class="bi bi-arrow-left-circle-fill me-2"></i>

                        <span
                            data-es="Inicio"
                            data-na="Pewaloyan">

                            Inicio

                        </span>

                    </button>

                    <h2
                        class="m-0 text-center fw-bold"
                        data-es="Crear Cuenta"
                        data-na="Mochiua Cuenta">

                        Crear Cuenta

                    </h2>

                </div>

                <!-- FORMULARIO -->

                <form id="registerForm">

                    <div class="row g-3">

                        <!-- NOMBRES -->

                        <div
                            class="col-md-6"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="Nombre(s)"
                                    data-na="Motoka">

                                    Nombre(s)

                                </span>

                            </label>

                            <input
                                type="text"
                                id="nombre"
                                class="form-control rounded-3 text-uppercase"
                                pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+"
                                required>

                        </div>

                        <!-- APELLIDO PATERNO -->

                        <div
                            class="col-md-6"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="Apellido paterno"
                                    data-na="Tetah itoka">

                                    Apellido paterno

                                </span>

                            </label>

                            <input
                                type="text"
                                id="apellidoPaterno"
                                class="form-control rounded-3 text-uppercase"
                                pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+"
                                required>

                        </div>

                        <!-- APELLIDO MATERNO -->

                        <div
                            class="col-md-6"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="Apellido materno"
                                    data-na="Tenan itoka">

                                    Apellido materno

                                </span>

                            </label>

                            <input
                                type="text"
                                id="apellidoMaterno"
                                class="form-control rounded-3 text-uppercase"
                                pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+"
                                required>

                        </div>

                        <!-- FECHA NACIMIENTO -->

                        <div
                            class="col-md-6"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="Fecha de nacimiento"
                                    data-na="Tonali tlen otlakat">

                                    Fecha de nacimiento

                                </span>

                            </label>

                            <input
                                type="date"
                                class="form-control rounded-3"
                                required>

                        </div>

                        <!-- USERNAME -->

                        <div
                            class="col-md-8"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="Nombre de usuario"
                                    data-na="Tokaitl usuario">

                                    Nombre de usuario

                                </span>

                            </label>

                            <input
                                type="text"
                                id="username"
                                class="form-control rounded-3">

                        </div>

                        <!-- GENERAR -->

                        <div
                            class="col-md-4 d-flex align-items-end"
                            data-aos="fade-up">

                            <button
                                type="button"
                                onclick="generarUsuario()"
                                class="btn btn-success w-100 rounded-3">

                                <i class="bi bi-magic me-2"></i>

                                <span
                                    data-es="Generar"
                                    data-na="Mochiua">

                                    Generar

                                </span>

                            </button>

                        </div>

                        <!-- PAIS -->

                        <div
                            class="col-md-6"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="País"
                                    data-na="Tlali">

                                    País

                                </span>

                            </label>

                            <select
                                id="pais"
                                onchange="cambiarPais()"
                                class="form-select rounded-3">

                                <option value="">

                                    Selecciona un país

                                </option>

                            </select>

                        </div>

                        <!-- ESTADO -->

                        <div
                            class="col-md-6"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="Estado / Provincia"
                                    data-na="Altepetl">

                                    Estado / Provincia

                                </span>

                            </label>

                            <select
                                id="estado"
                                class="form-select rounded-3">

                                <option value="">

                                    Selecciona

                                </option>

                            </select>

                        </div>

                        <!-- CORREO -->

                        <div
                            class="col-12"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="Correo electrónico"
                                    data-na="Correo electrónico">

                                    Correo electrónico

                                </span>

                            </label>

                            <input
                                type="email"
                                class="form-control rounded-3"
                                required>

                        </div>

                        <!-- CONTRASEÑA -->

                        <div
                            class="col-md-6"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="Contraseña"
                                    data-na="Tlatzakuilli">

                                    Contraseña

                                </span>

                            </label>

                            <div class="input-group">

                                <input
                                    type="password"
                                    id="password"
                                    class="form-control rounded-start-3"
                                    minlength="8"
                                    required>

                                    <button
                                        type="button"
                                        onclick="togglePassword()"
                                        class="btn btn-outline-secondary">

                                        <i
                                            id="iconPassword"
                                            class="bi bi-eye-fill">

                                        </i>

                                    </button>

                            </div>

                        </div>

                        <!-- CONFIRMAR -->

                        <div
                            class="col-md-6"
                            data-aos="fade-up">

                            <label class="form-label">

                                <span
                                    data-es="Confirmar contraseña"
                                    data-na="Oksepa tlatzakuilli">

                                    Confirmar contraseña

                                </span>

                            </label>

                            <input
                                type="password"
                                id="confirmPassword"
                                class="form-control rounded-3">

                        </div>

                    </div>

                    <!-- BOTON -->

                    <div
                        class="text-center mt-5"
                        data-aos="flip-up">

                        <button
                            type="submit"
                            class="btn register-btn btn-lg rounded-pill px-5">

                            <i class="bi bi-person-plus-fill me-2"></i>

                            <span
                                data-es="Crear Cuenta"
                                data-na="Mochiua Cuenta">

                                Crear Cuenta

                            </span>

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

    <!-- BOTÓN REGRESAR -->

        <div
            class="d-flex justify-content-start mt-5"
            data-aos="fade-right">

            <button
                onclick="window.location.href='home.html'"

                <i class="bi bi-arrow-left-circle-fill me-2"></i>

                <span
                    data-es="Regresar"
                    data-na="Mokuepa">

                    Regresar

                </span>

            </button>

        </div>

</section>
