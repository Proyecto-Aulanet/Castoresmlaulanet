<!DOCTYPE html>
<html lang="es" class="h-full">

<head>

    <meta charset="UTF-8">

    <!-- RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catores Multibilingues aul@Net</title>

    <!-- BOOTSTRAP -->
    <link rel="stylesheet" href="/assets/css/bootstrap.min.css">

    <!-- BOOTSTRAP ICONS -->
    <link rel="stylesheet" href="/assets/icons/bootstrap-icons.css">

    <!-- AOS -->
    <link rel="stylesheet" href="/assets/css/aos.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/styles/styles.css">

</head>

<body>

    <div id="app" class="w-full min-h-full flex flex-col">

 <!-- HEADER -->
<header
    class="header-main sticky-top shadow-lg">

    <div class="container">

        <div
            class="d-flex justify-content-between align-items-center py-3 flex-wrap gap-3">

            <div class="d-flex align-items-center gap-3">

                <div class="logo-circle float-anim">
                    🦎
                </div>

                <h1 class="title-main m-0">

                    Catores Multibilingues aul@Net

                </h1>

            </div>

            <div class="d-flex align-items-center gap-4 stats-box">

                <div class="d-flex align-items-center gap-1">

                    <i class="bi bi-fire text-warning"></i>

                    <span id="streak-display">0</span>

                </div>

                <div class="d-flex align-items-center gap-1">

                    <i class="bi bi-star-fill text-warning"></i>

                    <span id="xp-display">0</span>

                </div>

                <div class="d-flex align-items-center gap-1">

                    <i class="bi bi-heart-fill text-danger"></i>

                    <span id="lives-display">5</span>

                </div>

            </div>

        </div>

        <!-- NAV -->

        <nav class="pb-3">

            <div class="d-flex gap-2 overflow-auto">

                <button
                    onclick="showPage('home')"
                    class="btn btn-light rounded-pill">

                    Inicio

                </button>

                <button
                    onclick="showPage('modules')"
                    class="btn btn-light rounded-pill">

                    Lecciones

                </button>

            </div>

        </nav>

    </div>

</header>

        <!-- MAIN -->
        <main class="container py-5">

        <!-- HOME -->
        <section
            id="page-home"
            class="page-section">

            <div class="text-center mb-5">

                <div
                    class="display-1 mb-4 float-anim">

                    🦎

                </div>

                <h2
                    class="hero-title mb-3"
                    data-aos="fade-up">

                    ¡Aprende Náhuatl de forma divertida!

                </h2>

                <p
                    class="hero-text mx-auto"
                    data-aos="fade-up">

                    Descubre la riqueza del náhuatl.

                </p>

            </div>

            <div class="text-center">

                <button
                    onclick="showPage('modules')"
                    class="btn btn-success btn-lg rounded-pill px-5 pulse-glow">

                    ¡Comenzar a aprender! 🚀

                </button>

            </div>

        </section>

            <!-- MODULOS -->
            <section
                id="page-modules"
                class="page-section hidden">

                <h2
                    class="font-display text-2xl font-bold mb-6 text-jade-700">

                    📚 Módulos de Aprendizaje

                </h2>

                <div
                    id="modules-grid"
                    class="row g-4">

                </div>

            </section>

            <!-- MISIONES -->
            <section
                id="page-missions"
                class="page-section hidden">

                <button
                    onclick="showPage('modules')"
                    class="mb-4 bg-jade-500 text-white px-4 py-2 rounded-lg">

                    Volver

                </button>

                <div id="missions-container"></div>

            </section>

        </main>

    </div>

    <!-- BOOTSTRAP -->
    <script src="/assets/js/bootstrap.bundle.min.js"></script>

    <!-- AOS -->
    <script src="/assets/js/aos.js"></script>

    <!-- INIT AOS -->
    <script>
        AOS.init({
            duration: 800,
            once: true
        });
    </script>

    <!-- JS -->
    <script src="/js/app.js"></script>

</body>

</html>
