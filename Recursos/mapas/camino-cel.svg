<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 2400"
     width="100%"
     height="100%">

    <style>

        .sombra{
            fill:none;
            stroke:#9E9E9E;
            stroke-width:16;
            stroke-linecap:round;
            stroke-linejoin:round;
            opacity:.55;
        }

        .camino-principal{
            fill:none;
            stroke:#2563EB;
            stroke-width:12;
            stroke-linecap:round;
            stroke-linejoin:round;
        }

        .circulo-final{
            fill:#2563EB;
        }

        .anillo-inicio{
            fill:white;
            stroke:#2563EB;
            stroke-width:12;
        }

    </style>

    <!-- SOMBRA -->

    <path
        class="sombra"
        transform="translate(0,8)"
        d="
M 350 120

A 200 200 0 0 0 150 320
A 200 200 0 0 0 350 520

L 800 520

A 200 200 0 0 1 1000 720
A 200 200 0 0 1 800 920

L 350 920

A 200 200 0 0 0 150 1120
A 200 200 0 0 0 350 1320

L 800 1320

A 200 200 0 0 1 1000 1520
A 200 200 0 0 1 800 1720

L 350 1720

A 200 200 0 0 0 150 1920
A 200 200 0 0 0 350 2120

L 750 2500
        " />

    <!-- CAMINO -->

    <path
        class="camino-principal"
        d="
M 350 120

A 200 200 0 0 0 150 320
A 200 200 0 0 0 350 520

L 800 520

A 200 200 0 0 1 1000 720
A 200 200 0 0 1 800 920

L 350 920

A 200 200 0 0 0 150 1120
A 200 200 0 0 0 350 1320

L 800 1320

A 200 200 0 0 1 1000 1520
A 200 200 0 0 1 800 1720

L 350 1720

A 200 200 0 0 0 150 1920
A 200 200 0 0 0 350 2120

L 750 2500
        " />

    <!-- META -->

    <circle
        class="circulo-final"
        cx="350"
        cy="120"
        r="30" />

    <!-- INICIO -->

<circle
    class="anillo-inicio"
    cx="750"
    cy="2500"
    r="36" />

</svg>